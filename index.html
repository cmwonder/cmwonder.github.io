<!DOCTYPE html>
<html lang="zh-Hant"> 
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>竹北前三大景點</title>
    <link rel="stylesheet" href="styles.css"> 
</head>
<body>
    <header>
        <h1>竹北前三大景點</h1>
    </header>
    <main>
        <section class="attraction">
            <h2>1. 新竹動物園</h2>
            <iframe src="https://maps.google.com/maps?q=Hsinchu+Zoo,+Hsinchu+City,+Taiwan&output=embed" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            <p>位於竹北市中心，新竹動物園擁有超過 100 種動物。</p>
        </section>
        <section class="attraction">
            <h2>2. 竹北運動公園</h2>
            <iframe src="https://maps.google.com/maps?q=Zhubei+Sports+Park,+Zhubei,+Hsinchu,+Taiwan&output=embed" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            <p>是進行戶外活動的好去處，設有跑步道、自行車道與遊戲區。</p>
        </section>
        <section class="attraction">
            <h2>3. 新竹科學園區</h2>
            <iframe src="https://maps.google.com/maps?q=Hsinchu+Science+Park,+Taiwan&output=embed" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            <p>此科技園區以其創新企業與優美的環境聞名。</p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 精選景點</p>
    </footer>
</body>
</html>
